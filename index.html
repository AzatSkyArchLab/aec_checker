<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGR Checker — IFC-парсер</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="logo">▣</span>
          <span class="brand-name">AGR Checker</span>
          <span class="brand-sub">IFC parser & viewer</span>
        </div>
        <div class="topbar-actions">
          <span id="status" class="status"></span>
          <label class="btn">
            Открыть IFC
            <input id="file-input" type="file" accept=".ifc" hidden />
          </label>
        </div>
      </header>

      <main class="layout">
        <aside class="panel panel-left">
          <div class="panel-head">
            <input id="search" class="search" type="search" placeholder="Поиск по типу, имени, #id…" />
          </div>
          <div class="panel-body">
            <div id="checks" class="checks"></div>
            <div id="element-list" class="element-list"></div>
          </div>
        </aside>

        <section class="viewport">
          <div id="viewer" class="viewer"></div>

          <div id="view-toolbar" class="view-toolbar" hidden>
            <span id="sel-count" class="sel-count">Ничего не выделено</span>
            <button id="btn-isolate" class="tool-btn" title="Показать только выделенное (I)">Изолировать</button>
            <button id="btn-hide" class="tool-btn" title="Скрыть выделенное (H)">Скрыть</button>
            <button id="btn-showall" class="tool-btn" title="Показать всё (Esc)">Показать всё</button>
            <span class="tool-sep"></span>
            <button id="btn-map" class="tool-btn" title="Срез на уровне 0 → показать на карте">🗺 На карте</button>
          </div>

          <div id="dropzone" class="dropzone">
            <div class="dropzone-inner">
              <div class="dropzone-icon">⬇</div>
              <div class="dropzone-text">Перетащите <b>.ifc</b> файл сюда</div>
              <div class="dropzone-hint">или нажмите «Открыть IFC»</div>
            </div>
          </div>
        </section>

        <aside class="panel panel-right">
          <div class="panel-head"><span class="panel-title">Свойства</span></div>
          <div id="properties" class="panel-body"></div>
        </aside>
      </main>
    </div>

    <div id="map-modal" class="map-modal" hidden>
      <div class="map-dialog">
        <div class="map-head">
          <div class="map-titles">
            <span class="map-title">Контур на карте — срез на уровне 0</span>
            <span id="map-method" class="map-method"></span>
          </div>
          <button id="map-close" class="map-close" aria-label="Закрыть">✕</button>
        </div>
        <div id="map" class="map-canvas"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
