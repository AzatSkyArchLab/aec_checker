<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGR Checker — IFC-парсер</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="logo">▣</span>
          <span class="brand-name">AGR Checker</span>
          <span class="brand-sub">IFC parser & viewer</span>
        </div>
        <div class="topbar-actions">
          <span id="status" class="status"></span>
          <label class="btn">
            Открыть IFC
            <input id="file-input" type="file" accept=".ifc" hidden />
          </label>
        </div>
      </header>

      <main class="layout">
        <aside class="panel panel-left">
          <div class="panel-head">
            <input id="search" class="search" type="search" placeholder="Поиск по типу, имени, #id…" />
          </div>
          <div id="element-list" class="panel-body element-list"></div>
        </aside>

        <section class="viewport">
          <div id="viewer" class="viewer"></div>
          <div id="dropzone" class="dropzone">
            <div class="dropzone-inner">
              <div class="dropzone-icon">⬇</div>
              <div class="dropzone-text">Перетащите <b>.ifc</b> файл сюда</div>
              <div class="dropzone-hint">или нажмите «Открыть IFC»</div>
            </div>
          </div>
        </section>

        <aside class="panel panel-right">
          <div class="panel-head"><span class="panel-title">Свойства</span></div>
          <div id="properties" class="panel-body"></div>
        </aside>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
